<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDSMI - {{TITLE}}</title>
    <meta name="description" content="{{TITLE}} – Fotos und Eindrücke vom ITDSMI Frackmobil &amp; Alumni Verein.">
    <link rel="stylesheet" href="{{ROOT}}style.css">
    <style>
        html { scroll-behavior: smooth; }
        .gallery-section { margin-bottom: 3em; }

        .gallery-step-title {
            color: var(--primary-1);
            font-size: 1.2em;
            margin: 2em 0 1em 0;
            padding: 0 0 0.4em 0.5em;
            border-bottom: 1px solid #333;
            border-left: 4px solid var(--primary-1);
        }
        .gallery-step-title:first-child { margin-top: 0; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: var(--surface-light);
            cursor: pointer;
            aspect-ratio: 4/3;
            border: 1px solid #333;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .gallery-item:hover { border-color: var(--primary-1); transform: scale(1.02); z-index: 1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.3s ease; }
        .gallery-item img.loading { opacity: 0; }
        .gallery-item img.loaded  { opacity: 1; }

        .gallery-placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.7em;
        }

        /* Lightbox */
        .lightbox {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.92);
            flex-direction: column; align-items: center; justify-content: center;
        }
        .lightbox.active { display: flex; }

        .lightbox-inner {
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 3em 1em 4em;
        }
        .lightbox img {
            max-width: 90vw; max-height: 85vh; object-fit: contain;
            border-radius: 4px; box-shadow: 0 8px 40px rgba(0,0,0,0.8); user-select: none;
        }

        .lightbox-close, .lightbox-nav {
            background: var(--surface); border: 1px solid #444; color: var(--text);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s ease, border-color 0.2s ease; z-index: 1001; user-select: none;
        }
        .lightbox-close { position: fixed; top: 1em; right: 1em; width: 2.5em; height: 2.5em; font-size: 1.2em; }
        .lightbox-nav   { position: fixed; top: 50%; transform: translateY(-50%); width: 3em; height: 3em; font-size: 1.2em; }
        .lightbox-close:hover, .lightbox-nav:hover { background: var(--surface-light); border-color: var(--primary-1); }
        .lightbox-prev { left: 0.8em; }
        .lightbox-next { right: 0.8em; }

        .lightbox-caption {
            position: fixed; bottom: 2.8em; left: 50%; transform: translateX(-50%);
            color: var(--text); font-size: 0.9em; text-align: center;
            max-width: 80vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .lightbox-counter {
            position: fixed; bottom: 1.2em; left: 50%; transform: translateX(-50%);
            color: var(--text-muted); font-size: 0.85em; letter-spacing: 0.05em;
        }

        .gallery-loading { color: var(--text-muted); font-size: 0.9em; padding: 2em 0; }
        .gallery-error   { color: var(--text-muted); font-size: 0.9em; padding: 1em 0; border-left: 3px solid #555; padding-left: 1em; }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 5px; }
            .lightbox-nav { width: 2.2em; height: 2.2em; font-size: 1em; }
        }
    </style>
</head>

<body>
    <!-- HEADER_START -->
    {{HEADER}}
    <!-- HEADER_END -->

    <div class="main-layout">
        <!-- SIDEBAR_START -->
        {{SIDEBAR}}
        <!-- SIDEBAR_END -->

        <div class="content">
            <article class="blog-article">
                <header class="article-header">
                    <a href="{{ROOT}}index.html" class="back-link">&larr; Zurück zur Startseite</a>
                    <h1>{{TITLE}}</h1>
                    <div class="article-meta">
                        <span class="article-date">{{DATE}}</span>
                        <span class="article-author">ITDSMI Vorstand</span>
                    </div>
                </header>

                <div class="article-content">
                    <p id="intro">{{INTRO}}</p>

                    <h2 id="galerie">Galerie</h2>
                    <div id="gallery-root">
                        <p class="gallery-loading">Lade Bilder...</p>
                    </div>
                </div>
            </article>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Bildansicht">
        <button class="lightbox-close" id="lb-close" aria-label="Schliessen">&#x2715;</button>
        <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Vorheriges Bild">&#8249;</button>
        <div class="lightbox-inner"><img id="lb-img" src="" alt=""></div>
        <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Nächstes Bild">&#8250;</button>
        <div class="lightbox-caption" id="lb-caption"></div>
        <div class="lightbox-counter" id="lb-counter"></div>
    </div>

    <!-- FOOTER_START -->
    {{FOOTER}}
    <!-- FOOTER_END -->

    <script>
        // Gallery – reads images/manifest.json generated by blog/generate-manifest.js
        const GALLERY_ROOT = 'images/';
        let allImages = [], currentIndex = 0;

        async function loadGallery() {
            const root = document.getElementById('gallery-root');
            try {
                const resp = await fetch(GALLERY_ROOT + 'manifest.json');
                if (!resp.ok) throw new Error();
                renderGallery(root, await resp.json());
            } catch (_) {
                root.innerHTML = '<p class="gallery-error">Keine Bilder gefunden. <code>node blog/generate-manifest.js</code> ausführen.</p>';
            }
        }

        function renderGallery(root, manifest) {
            root.innerHTML = '';
            allImages = [];
            if (!manifest.steps || manifest.steps.length === 0) {
                root.innerHTML = '<p class="gallery-error">Keine Bilder gefunden.</p>';
                return;
            }
            const toc = document.getElementById('sidebar-toc');

            manifest.steps.forEach(step => {
                if (!step.images || step.images.length === 0) return;

                const section = document.createElement('div');
                section.className = 'gallery-section';

                const title = document.createElement('div');
                title.className = 'gallery-step-title';
                const stepId = 'step-' + (step.dir === '.' ? 'main' : step.dir).replace(/\s+/g, '-');
                title.id = stepId;
                title.textContent = step.name || step.dir;
                section.appendChild(title);

                if (toc) {
                    const li = document.createElement('li');
                    const a  = document.createElement('a');
                    a.href = '#' + stepId;
                    a.textContent = step.name || step.dir;
                    li.appendChild(a);
                    toc.appendChild(li);
                }

                const grid = document.createElement('div');
                grid.className = 'gallery-grid';

                step.images.forEach(filename => {
                    const src = GALLERY_ROOT + (step.dir === '.' ? '' : step.dir + '/') + filename;
                    const idx = allImages.length;
                    allImages.push({ src, caption: filename, step: step.name || step.dir });

                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.setAttribute('tabindex', '0');
                    item.setAttribute('role', 'button');
                    item.setAttribute('aria-label', filename);

                    const ph = document.createElement('div');
                    ph.className = 'gallery-placeholder';
                    ph.textContent = '...';
                    item.appendChild(ph);

                    const img = document.createElement('img');
                    img.className = 'loading';
                    img.alt = filename;
                    img.loading = 'lazy';
                    img.src = src;
                    img.onload  = () => { img.classList.replace('loading', 'loaded'); ph.remove(); };
                    img.onerror = () => { item.style.display = 'none'; };
                    item.appendChild(img);

                    item.addEventListener('click', () => openLightbox(idx));
                    item.addEventListener('keydown', e => {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(idx); }
                    });
                    grid.appendChild(item);
                });

                section.appendChild(grid);
                root.appendChild(section);
            });
        }

        // Lightbox
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');

        function openLightbox(idx) {
            currentIndex = idx; showImage(idx);
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        function showImage(idx) {
            const e = allImages[idx]; if (!e) return;
            lbImg.src = e.src; lbImg.alt = e.caption;
            document.getElementById('lb-caption').textContent = e.step ? e.step + ' – ' + e.caption : e.caption;
            document.getElementById('lb-counter').textContent = (idx + 1) + ' / ' + allImages.length;
        }
        function navigate(d) {
            currentIndex = (currentIndex + d + allImages.length) % allImages.length;
            showImage(currentIndex);
        }

        document.getElementById('lb-close').addEventListener('click', closeLightbox);
        document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
        document.getElementById('lb-next').addEventListener('click', () => navigate(1));
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft')  navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
        });

        let touchStartX = 0;
        lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        lightbox.addEventListener('touchend',   e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
        }, { passive: true });

        // Sidebar mobile close
        document.querySelectorAll('.sidebar a').forEach(a =>
            a.addEventListener('click', () => {
                document.querySelector('.sidebar').classList.remove('open');
                document.querySelector('.sidebar-backdrop').classList.remove('active');
            })
        );

        loadGallery();
    </script>
</body>

</html>
