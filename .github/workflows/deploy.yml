name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run build script
        run: node blog/generate-manifest.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the whole repo (excluding _partials and build scripts)
          path: .
          # GitHub Pages ignores _ prefixed dirs by default (Jekyll behaviour).
          # Since we're not using Jekyll, exclude manually via .nojekyll.

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
